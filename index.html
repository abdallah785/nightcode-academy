<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05050c;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes glow{0%,100%{box-shadow:0 0 5px #22d3ee40}50%{box-shadow:0 0 20px #22d3ee60}}
@keyframes matrixFall{0%{transform:translateY(-100%);opacity:1}100%{transform:translateY(100vh);opacity:0}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#22d3ee40;border-radius:10px}
button{font-family:inherit;cursor:pointer}
textarea,input{font-family:'JetBrains Mono',monospace}
#matrix-bg{position:fixed;inset:0;z-index:0;opacity:.06;pointer-events:none}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:16px 14px}
.card{padding:16px;border-radius:14px;background:#0a0a14;border:1px solid #1a1a2e;margin-bottom:10px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.cyan{color:#22d3ee}.violet{color:#a78bfa}.rose{color:#f472b6}.green{color:#4ade80}.yellow{color:#fbbf24}.red{color:#f87171}
.bg-cyan{background:#22d3ee20;border:1px solid #22d3ee40}
.bg-violet{background:#a78bfa20;border:1px solid #a78bfa40}
.bg-rose{background:#f472b640;border:1px solid #f472b660}
.bg-green{background:#4ade8020;border:1px solid #4ade8040}
.bg-yellow{background:#fbbf2420;border:1px solid #fbbf2440}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.tab-btn{padding:8px 14px;border:1px solid #1a1a2e;background:#0a0a14;color:#888;border-radius:8px;font-size:12px;transition:all .3s}
.tab-btn:hover{color:#ccc;border-color:#333}
.tab-btn.active{color:#22d3ee;border-color:#22d3ee;background:#22d3ee10}
.ticker{overflow:hidden;background:#0a0a14;border:1px solid #1a1a2e;border-radius:8px;padding:8px 0;margin-bottom:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#22d3ee80}
.ticker-inner{display:flex;gap:40px;animation:scroll 30s linear infinite;white-space:nowrap}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.xp-bar{height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-top:6px}
.xp-fill{height:100%;background:linear-gradient(90deg,#22d3ee,#a78bfa);border-radius:3px;transition:width .5s}
.lesson-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;cursor:pointer;transition:background .2s;border-bottom:1px solid #ffffff08}
.lesson-item:hover{background:#ffffff08}
.lesson-item input[type=checkbox]{accent-color:#22d3ee;width:16px;height:16px;cursor:pointer}
.lesson-content{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:20px;margin-top:12px;animation:fadeIn .3s}
h1{font-family:'JetBrains Mono',monospace;font-size:22px;color:#22d3ee}
h2{font-family:'JetBrains Mono',monospace;font-size:16px;color:#a78bfa;margin:16px 0 8px}
h3{font-family:'JetBrains Mono',monospace;font-size:14px;color:#f472b6;margin:12px 0 6px}
.concept-card{background:#0f0f1e;border:1px solid #22d3ee20;border-radius:10px;padding:14px;margin:8px 0}
.concept-card h4{color:#22d3ee;font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:6px}
.concept-card p{font-size:13px;line-height:1.6;color:#b0b0c0}
.code-block{background:#0a0a14;border:1px solid #22d3ee20;border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#22d3ee;margin:8px 0;overflow-x:auto;white-space:pre}
.quiz-option{display:block;width:100%;text-align:left;padding:10px 14px;margin:6px 0;border:1px solid #1a1a2e;background:#0a0a14;color:#e2e8f0;border-radius:8px;font-size:13px;transition:all .2s}
.quiz-option:hover{border-color:#22d3ee;background:#22d3ee08}
.quiz-option.correct{border-color:#4ade80;background:#4ade8020;color:#4ade80}
.quiz-option.wrong{border-color:#f87171;background:#f8717120;color:#f87171}
.quiz-option.disabled{pointer-events:none;opacity:.7}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0}
.stat-card{text-align:center;padding:14px;border-radius:10px;background:#0a0a14;border:1px solid #1a1a2e}
.stat-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:#888;margin-top:4px}
.difficulty-bar{display:flex;gap:2px;margin-top:4px}
.diff-seg{height:4px;flex:1;border-radius:2px;background:#1a1a2e}
.diff-seg.filled{background:#22d3ee}
.diff-seg.medium{background:#fbbf24}
.diff-seg.hard{background:#f87171}
.sr-badge{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}
.sr-new{background:#22d3ee20;color:#22d3ee}
.sr-learning{background:#fbbf2420;color:#fbbf24}
.sr-review{background:#4ade8020;color:#4ade80}
.sr-mastered{background:#a78bfa20;color:#a78bfa}
.expand-btn{background:none;border:none;color:#22d3ee;font-size:12px;padding:4px 8px;font-family:'JetBrains Mono',monospace}
.module-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:10px;border-radius:8px;transition:background .2s}
.module-header:hover{background:#ffffff06}
.hidden{display:none}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.timer-display{font-family:'JetBrains Mono',monospace;color:#22d3ee;font-size:14px}
.streak-fire{font-size:20px;animation:pulse 1s infinite}
.weak-topic{padding:8px 12px;margin:4px 0;border-radius:8px;border-left:3px solid #f87171;background:#f8717108;font-size:13px}
.strong-topic{padding:8px 12px;margin:4px 0;border-radius:8px;border-left:3px solid #4ade80;background:#4ade8008;font-size:13px}
.progress-ring{position:relative;display:inline-block}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px}
.flash-card{perspective:800px;cursor:pointer;margin:8px 0}
.flash-inner{position:relative;width:100%;min-height:120px;transition:transform .6s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;padding:16px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px}
.flash-front{background:#0f0f1e;border:1px solid #22d3ee30;color:#e2e8f0}
.flash-back{background:#0f0f1e;border:1px solid #4ade8030;color:#4ade80;transform:rotateY(180deg)}
.speed-indicator{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace}
.speed-fast{background:#4ade8020;color:#4ade80}
.speed-normal{background:#fbbf2420;color:#fbbf24}
.speed-slow{background:#f8717120;color:#f87171}
</style>

// ====== LEARNING ENGINE ======
class LearningEngine {
  constructor() {
    this.data = JSON.parse(localStorage.getItem('nc3_data')) || {};
    if (!this.data.lessons) this.data.lessons = {};
    if (!this.data.quizHistory) this.data.quizHistory = [];
    if (!this.data.sessionHistory) this.data.sessionHistory = [];
    if (!this.data.streak) this.data.streak = {current:0,best:0,lastDate:null};
    if (!this.data.totalStudyTime) this.data.totalStudyTime = 0;
    if (!this.data.startDate) this.data.startDate = Date.now();
    this.sessionStart = Date.now();
    this.save();
  }
  save() { localStorage.setItem('nc3_data', JSON.stringify(this.data)); }
  
  getLessonData(lessonId) {
    if (!this.data.lessons[lessonId]) {
      this.data.lessons[lessonId] = {
        done: false,
        quizAttempts: 0,
        quizCorrect: 0,
        quizHistory: [],
        difficulty: 0, // 0-5, higher = harder for student
        srLevel: 0, // spaced repetition: 0=new,1=learning,2=review,3=mastered
        srNextReview: null,
        timeSpent: 0,
        lastStudied: null,
        wrongAnswers: [] // track which questions were answered wrong
      };
    }
    return this.data.lessons[lessonId];
  }
  
  markDone(lessonId, done) {
    const ld = this.getLessonData(lessonId);
    ld.done = done;
    if (done) ld.lastStudied = Date.now();
    this.save();
  }
  
  recordQuiz(lessonId, questionIndex, correct, timeTaken) {
    const ld = this.getLessonData(lessonId);
    ld.quizAttempts++;
    if (correct) ld.quizCorrect++;
    else ld.wrongAnswers.push(questionIndex);
    ld.quizHistory.push({q: questionIndex, correct, time: timeTaken, date: Date.now()});
    
    // Update difficulty based on recent performance
    const recent = ld.quizHistory.slice(-5);
    const recentCorrect = recent.filter(r => r.correct).length;
    ld.difficulty = Math.max(0, Math.min(5, 5 - recentCorrect));
    
    // Update spaced repetition level
    if (recentCorrect >= 4) ld.srLevel = Math.min(3, ld.srLevel + 1);
    else if (recentCorrect <= 1) ld.srLevel = Math.max(0, ld.srLevel - 1);
    
    // Set next review time based on SR level
    const intervals = [0, 1*86400000, 3*86400000, 7*86400000]; // 0, 1day, 3days, 7days
    ld.srNextReview = Date.now() + (intervals[ld.srLevel] || 0);
    
    // Global quiz history
    this.data.quizHistory.push({lessonId, questionIndex, correct, timeTaken, date: Date.now()});
    
    this.save();
  }
  
  updateStreak() {
    const today = new Date().toDateString();
    if (this.data.streak.lastDate !== today) {
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      if (this.data.streak.lastDate === yesterday) {
        this.data.streak.current++;
      } else if (this.data.streak.lastDate !== today) {
        this.data.streak.current = 1;
      }
      this.data.streak.lastDate = today;
      this.data.streak.best = Math.max(this.data.streak.best, this.data.streak.current);
      this.save();
    }
  }
  
  getGlobalStats() {
    let totalLessons = 0, doneLessons = 0, totalQuiz = 0, correctQuiz = 0;
    let weakTopics = [], strongTopics = [];
    
    FORMATION.matieres.forEach(m => m.modules.forEach(mod => mod.lessons.forEach(l => {
      totalLessons++;
      const ld = this.getLessonData(l.id);
      if (ld.done) doneLessons++;
      totalQuiz += ld.quizAttempts;
      correctQuiz += ld.quizCorrect;
      if (ld.quizAttempts >= 3 && ld.difficulty >= 3) weakTopics.push({name: l.name, diff: ld.difficulty, id: l.id});
      if (ld.quizAttempts >= 3 && ld.difficulty <= 1) strongTopics.push({name: l.name, diff: ld.difficulty, id: l.id});
    })));
    
    return {
      totalLessons, doneLessons, totalQuiz, correctQuiz,
      accuracy: totalQuiz > 0 ? Math.round(correctQuiz/totalQuiz*100) : 0,
      progress: Math.round(doneLessons/totalLessons*100),
      weakTopics: weakTopics.sort((a,b) => b.diff - a.diff).slice(0,5),
      strongTopics: strongTopics.slice(0,5),
      streak: this.data.streak,
      daysStudying: Math.ceil((Date.now() - this.data.startDate) / 86400000)
    };
  }
  
  getDueReviews() {
    const due = [];
    FORMATION.matieres.forEach(m => m.modules.forEach(mod => mod.lessons.forEach(l => {
      const ld = this.getLessonData(l.id);
      if (ld.srNextReview && ld.srNextReview <= Date.now() && ld.srLevel < 3) {
        due.push({lesson: l, data: ld, module: mod.name, matiere: m.name});
      }
    })));
    return due;
  }
  
  getRecommendedNext() {
    // Find first undone lesson or lesson needing review
    const due = this.getDueReviews();
    if (due.length > 0) return {type: 'review', item: due[0]};
    
    for (const m of FORMATION.matieres) {
      for (const mod of m.modules) {
        for (const l of mod.lessons) {
          const ld = this.getLessonData(l.id);
          if (!ld.done) return {type: 'new', lesson: l, module: mod, matiere: m};
        }
      }
    }
    return null;
  }
  
  getAnswerSpeed() {
    const recent = this.data.quizHistory.slice(-20);
    if (recent.length === 0) return 'N/A';
    const avgTime = recent.reduce((s,r) => s + (r.timeTaken||5000), 0) / recent.length;
    if (avgTime < 5000) return {label:'Rapide', class:'speed-fast'};
    if (avgTime < 10000) return {label:'Normal', class:'speed-normal'};
    return {label:'Lent', class:'speed-slow'};
  }
}

// ====== MATRIX BACKGROUND ======
function initMatrix() {
  const c = document.getElementById('matrix-bg');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  const cols = Math.floor(c.width / 14);
  const drops = Array(cols).fill(0);
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789{}[]()<>=;:+-*/&|!?#@$%^~';
  setInterval(() => {
    ctx.fillStyle = 'rgba(5,5,12,0.05)';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.fillStyle = '#22d3ee';
    ctx.font = '12px JetBrains Mono';
    for (let i = 0; i < cols; i++) {
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, drops[i] * 14);
      if (drops[i] * 14 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }, 50);
  window.addEventListener('resize', () => { c.width = window.innerWidth; c.height = window.innerHeight; });
}

// ====== PROGRESS RING ======
function progressRing(percent, size=60, color='#22d3ee') {
  const r = (size - 8) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return '<div class="progress-ring" style="width:'+size+'px;height:'+size+'px">' +
    '<svg width="'+size+'" height="'+size+'"><circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="#1a1a2e" stroke-width="4"/>' +
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg>' +
    '<div class="label" style="color:'+color+'">'+percent+'%</div></div>';
}

// ====== SR BADGE ======
function srBadge(level) {
  const labels = ['Nouveau','En cours','Revision','Maitrise'];
  const classes = ['sr-new','sr-learning','sr-review','sr-mastered'];
  return '<span class="sr-badge '+classes[level]+'">'+labels[level]+'</span>';
}

// ====== DIFFICULTY BAR ======
function diffBar(level) {
  let html = '<div class="difficulty-bar">';
  for (let i = 0; i < 5; i++) {
    let cls = i < level ? (level >= 4 ? 'filled hard' : level >= 2 ? 'filled medium' : 'filled') : '';
    html += '<div class="diff-seg '+cls+'"></div>';
  }
  return html + '</div>';
}

}

  html += '</div>';

function answerQuiz(idx) {
  if (state.quizAnswered) return;
  const timeTaken = Date.now() - state.quizStartTime;
  const q = state.quizLesson.quiz[state.quizIndex];
  const correct = idx === q.a;
  engine.recordQuiz(state.quizLesson.id, state.quizIndex, correct, timeTaken);
  state.quizAnswered = true;
  state.quizSelectedAnswer = idx;
  render();
}

function renderStats(stats) {
  let html = '<div class="card">';
  html += '<h2>&#x1F4CA; Tableau de bord</h2>';
  
  // Stats grid
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-val cyan">'+stats.progress+'%</div><div class="stat-label">Progression globale</div></div>';
  html += '<div class="stat-card"><div class="stat-val violet">'+stats.doneLessons+'</div><div class="stat-label">Lecons terminees</div></div>';
  html += '<div class="stat-card"><div class="stat-val rose">'+stats.totalQuiz+'</div><div class="stat-label">Quiz repondus</div></div>';
  html += '<div class="stat-card"><div class="stat-val '+(stats.accuracy>=70?'green':stats.accuracy>=40?'yellow':'red')+'">'+stats.accuracy+'%</div><div class="stat-label">Precision quiz</div></div>';
  html += '<div class="stat-card"><div class="stat-val yellow">'+stats.streak.current+'</div><div class="stat-label">Jours de suite</div></div>';
  html += '<div class="stat-card"><div class="stat-val cyan">'+stats.streak.best+'</div><div class="stat-label">Meilleur streak</div></div>';
  html += '<div class="stat-card"><div class="stat-val green">'+stats.daysStudying+'</div><div class="stat-label">Jours depuis debut</div></div>';
  const speed = engine.getAnswerSpeed();
  html += '<div class="stat-card"><div class="stat-val '+(typeof speed==='object'?speed.class.replace('speed-',''):'cyan')+'">'+(typeof speed==='object'?speed.label:'N/A')+'</div><div class="stat-label">Vitesse de reponse</div></div>';
  html += '</div>';
  
  // Progress by matiere
  html += '<h3 style="margin-top:16px">Progression par matiere</h3>';
  FORMATION.matieres.forEach(m => {
    let done = 0, total = 0;
    m.modules.forEach(mod => mod.lessons.forEach(l => {
      total++;
      if (engine.getLessonData(l.id).done) done++;
    }));
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    html += '<div style="margin:8px 0">';
    html += '<div class="flex-between" style="margin-bottom:4px"><span style="font-size:12px">'+m.name+'</span><span class="cyan" style="font-size:11px;font-family:JetBrains Mono">'+pct+'%</span></div>';
    html += '<div class="xp-bar"><div class="xp-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+(pct===100?'#4ade80,#22d3ee':'#22d3ee,#a78bfa')+')"></div></div>';
    html += '</div>';
  });
  
  // Weak topics
  if (stats.weakTopics.length > 0) {
    html += '<h3 style="margin-top:16px">&#x26A0; Points faibles (a retravailler)</h3>';
    stats.weakTopics.forEach(t => {
      html += '<div class="weak-topic"><span>'+t.name+'</span> '+diffBar(t.diff);
      html += '<button class="expand-btn" onclick="startQuizForLesson(\''+t.id+'\')">&#127942; Quiz</button></div>';
    });
  }
  
  // Strong topics
  if (stats.strongTopics.length > 0) {
    html += '<h3 style="margin-top:16px">&#x2705; Points forts</h3>';
    stats.strongTopics.forEach(t => {
      html += '<div class="strong-topic"><span>'+t.name+'</span> '+diffBar(t.diff)+'</div>';
    });
  }
  
  // Quiz history chart (last 20)
  html += '<h3 style="margin-top:16px">Historique des quiz (20 derniers)</h3>';
  const recent = engine.data.quizHistory.slice(-20);
  if (recent.length > 0) {
    html += '<div style="display:flex;align-items:end;gap:3px;height:60px;padding:8px 0">';
    recent.forEach(r => {
      html += '<div style="flex:1;height:'+(r.correct?'100':'30')+'%;background:'+(r.correct?'#4ade80':'#f87171')+';border-radius:2px;min-width:8px" title="'+(r.correct?'Correct':'Incorrect')+'"></div>';
    });
    html += '</div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:10px;color:#666"><span>Plus ancien</span><span>Plus recent</span></div>';
  } else {
    html += '<p style="font-size:12px;color:#666">Aucun quiz effectue pour le moment.</p>';
  }
  
  html += '</div>';
  return html;
}

// ====== REVIEW TAB ======
function renderReview() {
  let html = '<div class="card">';
  html += '<h2>&#x1F504; Revisions (Repetition espacee)</h2>';
  html += '<p style="font-size:12px;color:#888;margin-bottom:12px">Le systeme identifie automatiquement les lecons a reviser selon ton rythme et tes resultats.</p>';
  
  const due = engine.getDueReviews();
  
  if (due.length > 0) {
    html += '<div class="concept-card" style="border-color:#fbbf2440">';
    html += '<h4 class="yellow">'+due.length+' lecon(s) a reviser maintenant</h4>';
    html += '</div>';
    
    due.forEach(d => {
      html += '<div class="lesson-item">';
      html += srBadge(d.data.srLevel);
      html += '<span style="flex:1;font-size:12px">'+d.lesson.name+'</span>';
      html += '<span style="font-size:10px;color:#888">'+d.module+'</span>';
      html += '<button class="tab-btn" style="font-size:10px;padding:4px 8px" onclick="startQuizForLesson(\''+d.lesson.id+'\')">Quiz</button>';
      html += '<button class="tab-btn" style="font-size:10px;padding:4px 8px" onclick="setState({tab:\'learn\',activeLesson:{lesson:JSON.parse(JSON.stringify(findLesson(\''+d.lesson.id+'\')))}})">Relire</button>';
      html += '</div>';
    });
  } else {
    html += '<div class="concept-card" style="border-color:#4ade8040">';
    html += '<h4 class="green">&#x2705; Aucune revision en attente!</h4>';
    html += '<p style="font-size:12px;color:#888">Continue a apprendre de nouvelles lecons ou fais des quiz pour declencher le systeme de revision.</p>';
    html += '</div>';
  }
  
  // SR Overview
  html += '<h3 style="margin-top:16px">Etat de revision par niveau</h3>';
  let srCounts = [0,0,0,0];
  FORMATION.matieres.forEach(m => m.modules.forEach(mod => mod.lessons.forEach(l => {
    const ld = engine.getLessonData(l.id);
    srCounts[ld.srLevel]++;
  })));
  const srLabels = ['Nouveau','En cours','Revision','Maitrise'];
  const srColors = ['#22d3ee','#fbbf24','#a78bfa','#4ade80'];
  html += '<div class="stats-grid">';
  srCounts.forEach((c, i) => {
    html += '<div class="stat-card"><div class="stat-val" style="color:'+srColors[i]+'">'+c+'</div><div class="stat-label">'+srLabels[i]+'</div></div>';
  });
  html += '</div>';
  
  html += '</div>';
  return html;
}
