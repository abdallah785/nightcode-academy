// ===== SAVE/LOAD PROGRESS =====
function loadProgress(){try{return JSON.parse(localStorage.getItem('nc_progress')||'{}')}catch(e){return {}}}
function saveProgress(p){localStorage.setItem('nc_progress',JSON.stringify(p))}
function loadXP(){const p=loadProgress();let done=0,total=0;FORMATION.forEach(m=>m.modules.forEach(mod=>{total+=mod.lessons.length;mod.lessons.forEach((_,i)=>{if(p[mod.name+'_'+i])done++})}));return{done,total,pct:total?Math.round(done/total*100):0}}
