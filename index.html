<script>
// Matrix Rain Background
(function(){
  const c=document.getElementById('matrix-bg'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const cols=Math.floor(c.width/14),drops=Array(cols).fill(0).map(()=>Math.random()*-50);
  const chars='01{}[];=>const let function async await SELECT FROM def class import'.split('');
  function draw(){
    ctx.fillStyle='rgba(5,5,12,0.08)';ctx.fillRect(0,0,c.width,c.height);ctx.font='12px monospace';
    for(let i=0;i<drops.length;i++){
      const ch=chars[Math.floor(Math.random()*chars.length)];
      const b=50+Math.random()*100;
      ctx.fillStyle='rgba(0,'+(b+130)+','+(b+70)+','+(0.15+Math.random()*0.35)+')';
      ctx.fillText(ch,i*14,drops[i]*14);
      if(drops[i]*14>c.height&&Math.random()>0.98)drops[i]=0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

// ===== TICKER COMPONENT =====
function Ticker(){
  const[si,setSi]=useState(0);const[ci,setCi]=useState(0);const[del,setDel]=useState(false);
  useEffect(()=>{
    const s=SNIPPETS[si];let t;
    if(!del&&ci<s.length)t=setTimeout(()=>setCi(c=>c+1),20+Math.random()*25);
    else if(!del&&ci>=s.length)t=setTimeout(()=>setDel(true),2000);
    else if(del&&ci>0)t=setTimeout(()=>setCi(c=>c-1),8);
    else{setDel(false);setSi((si+1)%SNIPPETS.length);}
    return()=>clearTimeout(t);
  },[ci,del,si]);
  return React.createElement("div",{style:{padding:"12px 14px",borderRadius:10,background:"#000",border:"1px solid #1a1a2e",marginBottom:16,position:"relative",minHeight:70,overflow:"hidden"}},
    React.createElement("div",{style:{position:"absolute",top:8,right:12,fontSize:8,letterSpacing:2,color:"#22d3ee25",fontFamily:"monospace"}},"LIVE CODE"),
    React.createElement("div",{style:{display:"flex",gap:5,marginBottom:8}},
      ["#ef4444","#fbbf24","#34d399"].map((c,i)=>React.createElement("div",{key:i,style:{width:7,height:7,borderRadius:"50%",background:c}}))
    ),
    React.createElement("pre",{style:{margin:0,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#22d3ee",lineHeight:1.6,whiteSpace:"pre-wrap"}},
      SNIPPETS[si].replace(/\\n/g,"\n").slice(0,ci),
      React.createElement("span",{style:{animation:"blink .8s step-end infinite"}},"\u2588")
    )
  );
}
